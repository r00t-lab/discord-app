name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Paketleri yükle
        run: npm install

      - name: EXE dosyasını oluştur
        run: npm run build

      - name: EXE dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: YKS-Ajans-Setup
          path: dist/*.exe
          retention-days: 30
